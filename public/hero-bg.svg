<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" cx="50%" cy="65%" r="85%">
      <stop offset="0" stop-color="#06101a"/>
      <stop offset="35%" stop-color="#07090c"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="warmBokeh">
      <stop offset="0" stop-color="oklch(78% 0.14 245)" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="oklch(70% 0.16 245)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="oklch(70% 0.16 245)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmCore">
      <stop offset="0" stop-color="#eaf3ff" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="oklch(85% 0.10 235)" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="oklch(70% 0.16 245)" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="oklch(70% 0.16 245)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coolBokeh">
      <stop offset="0" stop-color="oklch(85% 0.08 215)" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="oklch(85% 0.08 215)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="oklch(85% 0.08 215)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="atmosphereTop" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="atmosphereBottom" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="oklch(70% 0.16 245)" stop-opacity="0"/>
      <stop offset="60%" stop-color="oklch(70% 0.16 245)" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="oklch(70% 0.16 245)" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="hazeWash" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="oklch(70% 0.16 245)" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="oklch(70% 0.16 245)" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <radialGradient id="floorPool" cx="50%" cy="100%" r="60%">
      <stop offset="0" stop-color="oklch(70% 0.16 245)" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="oklch(70% 0.16 245)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base atmosphere -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#hazeWash)"/>

  <!-- Distant city silhouette -->
  <g opacity="0.55">
    <rect x="0"    y="780" width="120" height="300" fill="#050505"/>
    <rect x="120"  y="720" width="100" height="360" fill="#080808"/>
    <rect x="220"  y="760" width="140" height="320" fill="#050505"/>
    <rect x="360"  y="680" width="110" height="400" fill="#0a0a0a"/>
    <rect x="470"  y="730" width="120" height="350" fill="#070707"/>
    <rect x="590"  y="700" width="100" height="380" fill="#080808"/>
    <rect x="690"  y="760" width="130" height="320" fill="#050505"/>
    <rect x="820"  y="740" width="90"  height="340" fill="#070707"/>
    <rect x="910"  y="700" width="120" height="380" fill="#0a0a0a"/>
    <rect x="1030" y="760" width="110" height="320" fill="#050505"/>
    <rect x="1140" y="720" width="100" height="360" fill="#080808"/>
    <rect x="1240" y="780" width="130" height="300" fill="#050505"/>
    <rect x="1370" y="700" width="110" height="380" fill="#0a0a0a"/>
    <rect x="1480" y="740" width="120" height="340" fill="#070707"/>
    <rect x="1600" y="700" width="100" height="380" fill="#080808"/>
    <rect x="1700" y="760" width="120" height="320" fill="#050505"/>
    <rect x="1820" y="720" width="100" height="360" fill="#070707"/>
  </g>

  <!-- City windows -->
  <g fill="oklch(78% 0.14 245)">
    <rect x="40"   y="820" width="2" height="3" opacity="0.7"/>
    <rect x="55"   y="850" width="2" height="3" opacity="0.55"/>
    <rect x="75"   y="880" width="2" height="3" opacity="0.6"/>
    <rect x="92"   y="830" width="2" height="3" opacity="0.45"/>
    <rect x="135"  y="780" width="2" height="3" opacity="0.7"/>
    <rect x="155"  y="810" width="2" height="3" opacity="0.5"/>
    <rect x="175"  y="850" width="2" height="3" opacity="0.65"/>
    <rect x="195"  y="900" width="2" height="3" opacity="0.4"/>
    <rect x="240"  y="820" width="2" height="3" opacity="0.6"/>
    <rect x="265"  y="850" width="2" height="3" opacity="0.7"/>
    <rect x="290"  y="880" width="2" height="3" opacity="0.45"/>
    <rect x="320"  y="800" width="2" height="3" opacity="0.65"/>
    <rect x="375"  y="730" width="2" height="3" opacity="0.7"/>
    <rect x="395"  y="770" width="2" height="3" opacity="0.5"/>
    <rect x="415"  y="810" width="2" height="3" opacity="0.6"/>
    <rect x="435"  y="860" width="2" height="3" opacity="0.45"/>
    <rect x="455"  y="900" width="2" height="3" opacity="0.5"/>
    <rect x="490"  y="780" width="2" height="3" opacity="0.7"/>
    <rect x="510"  y="820" width="2" height="3" opacity="0.55"/>
    <rect x="530"  y="860" width="2" height="3" opacity="0.6"/>
    <rect x="555"  y="900" width="2" height="3" opacity="0.45"/>
    <rect x="600"  y="750" width="2" height="3" opacity="0.6"/>
    <rect x="625"  y="790" width="2" height="3" opacity="0.7"/>
    <rect x="645"  y="830" width="2" height="3" opacity="0.5"/>
    <rect x="665"  y="870" width="2" height="3" opacity="0.55"/>
    <rect x="700"  y="800" width="2" height="3" opacity="0.65"/>
    <rect x="725"  y="840" width="2" height="3" opacity="0.45"/>
    <rect x="745"  y="880" width="2" height="3" opacity="0.6"/>
    <rect x="775"  y="920" width="2" height="3" opacity="0.5"/>
    <rect x="830"  y="780" width="2" height="3" opacity="0.7"/>
    <rect x="855"  y="820" width="2" height="3" opacity="0.55"/>
    <rect x="880"  y="860" width="2" height="3" opacity="0.6"/>
    <rect x="920"  y="730" width="2" height="3" opacity="0.7"/>
    <rect x="945"  y="770" width="2" height="3" opacity="0.5"/>
    <rect x="970"  y="810" width="2" height="3" opacity="0.6"/>
    <rect x="995"  y="850" width="2" height="3" opacity="0.45"/>
    <rect x="1020" y="900" width="2" height="3" opacity="0.55"/>
    <rect x="1045" y="800" width="2" height="3" opacity="0.65"/>
    <rect x="1075" y="830" width="2" height="3" opacity="0.45"/>
    <rect x="1100" y="870" width="2" height="3" opacity="0.6"/>
    <rect x="1145" y="760" width="2" height="3" opacity="0.7"/>
    <rect x="1170" y="800" width="2" height="3" opacity="0.55"/>
    <rect x="1195" y="840" width="2" height="3" opacity="0.6"/>
    <rect x="1220" y="880" width="2" height="3" opacity="0.45"/>
    <rect x="1255" y="820" width="2" height="3" opacity="0.65"/>
    <rect x="1280" y="850" width="2" height="3" opacity="0.5"/>
    <rect x="1310" y="890" width="2" height="3" opacity="0.6"/>
    <rect x="1340" y="930" width="2" height="3" opacity="0.45"/>
    <rect x="1380" y="730" width="2" height="3" opacity="0.7"/>
    <rect x="1405" y="770" width="2" height="3" opacity="0.55"/>
    <rect x="1430" y="810" width="2" height="3" opacity="0.65"/>
    <rect x="1455" y="850" width="2" height="3" opacity="0.5"/>
    <rect x="1485" y="900" width="2" height="3" opacity="0.6"/>
    <rect x="1510" y="780" width="2" height="3" opacity="0.65"/>
    <rect x="1535" y="820" width="2" height="3" opacity="0.5"/>
    <rect x="1560" y="860" width="2" height="3" opacity="0.6"/>
    <rect x="1610" y="730" width="2" height="3" opacity="0.7"/>
    <rect x="1635" y="770" width="2" height="3" opacity="0.55"/>
    <rect x="1660" y="810" width="2" height="3" opacity="0.6"/>
    <rect x="1685" y="850" width="2" height="3" opacity="0.45"/>
    <rect x="1715" y="800" width="2" height="3" opacity="0.65"/>
    <rect x="1740" y="840" width="2" height="3" opacity="0.5"/>
    <rect x="1765" y="880" width="2" height="3" opacity="0.6"/>
