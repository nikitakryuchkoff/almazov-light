    <rect x="1855" y="820" width="2" height="3" opacity="0.5"/>
    <rect x="1880" y="860" width="2" height="3" opacity="0.6"/>
  </g>

  <!-- Soft atmospheric bokeh — large -->
  <circle cx="320"  cy="380" r="240" fill="url(#warmBokeh)"/>
  <circle cx="1620" cy="450" r="280" fill="url(#warmBokeh)"/>
  <circle cx="1100" cy="220" r="200" fill="url(#coolBokeh)"/>
  <circle cx="180"  cy="650" r="200" fill="url(#warmBokeh)"/>
  <circle cx="1750" cy="680" r="220" fill="url(#warmBokeh)"/>

  <!-- Medium bokeh -->
  <circle cx="500"  cy="540" r="110" fill="url(#warmBokeh)"/>
  <circle cx="850"  cy="350" r="130" fill="url(#warmBokeh)"/>
  <circle cx="1280" cy="600" r="140" fill="url(#warmBokeh)"/>
  <circle cx="650"  cy="200" r="90"  fill="url(#coolBokeh)"/>
  <circle cx="1450" cy="180" r="100" fill="url(#warmBokeh)"/>

  <!-- Small bokeh -->
  <circle cx="220"  cy="260" r="55" fill="url(#warmBokeh)"/>
  <circle cx="420"  cy="180" r="45" fill="url(#warmBokeh)"/>
  <circle cx="730"  cy="450" r="60" fill="url(#warmBokeh)"/>
  <circle cx="950"  cy="580" r="50" fill="url(#warmBokeh)"/>
  <circle cx="1180" cy="380" r="55" fill="url(#coolBokeh)"/>
  <circle cx="1380" cy="450" r="60" fill="url(#warmBokeh)"/>
  <circle cx="1550" cy="320" r="50" fill="url(#warmBokeh)"/>
  <circle cx="1700" cy="200" r="40" fill="url(#warmBokeh)"/>
  <circle cx="80"   cy="450" r="40" fill="url(#warmBokeh)"/>

  <!-- Bright pinpoint lights with halos (suspended fixtures feel) -->
  <g>
    <circle cx="430"  cy="390" r="50" fill="url(#warmCore)"/>
    <circle cx="430"  cy="390" r="2.5" fill="#fff5e0"/>
    <circle cx="700"  cy="280" r="42" fill="url(#warmCore)"/>
    <circle cx="700"  cy="280" r="2"   fill="#fff5e0"/>
    <circle cx="970"  cy="430" r="55" fill="url(#warmCore)"/>
    <circle cx="970"  cy="430" r="2.5" fill="#fff5e0"/>
    <circle cx="1240" cy="320" r="45" fill="url(#warmCore)"/>
    <circle cx="1240" cy="320" r="2"   fill="#fff5e0"/>
    <circle cx="1500" cy="540" r="50" fill="url(#warmCore)"/>
    <circle cx="1500" cy="540" r="2.5" fill="#fff5e0"/>
    <circle cx="1820" cy="380" r="40" fill="url(#warmCore)"/>
    <circle cx="1820" cy="380" r="2"   fill="#fff5e0"/>
    <circle cx="270"  cy="510" r="45" fill="url(#warmCore)"/>
    <circle cx="270"  cy="510" r="2"   fill="#fff5e0"/>
  </g>

  <!-- Suspended pendant cables (subtle) -->
  <g stroke="rgba(245,244,240,0.06)" stroke-width="0.5" fill="none">
    <line x1="430"  y1="0" x2="430"  y2="390"/>
    <line x1="700"  y1="0" x2="700"  y2="280"/>
    <line x1="970"  y1="0" x2="970"  y2="430"/>
    <line x1="1240" y1="0" x2="1240" y2="320"/>
    <line x1="1500" y1="0" x2="1500" y2="540"/>
    <line x1="1820" y1="0" x2="1820" y2="380"/>
    <line x1="270"  y1="0" x2="270"  y2="510"/>
  </g>

  <!-- Vignette / overlays for legibility -->
  <rect width="1920" height="350" fill="url(#atmosphereTop)"/>
  <rect width="1920" height="1080" fill="url(#atmosphereBottom)"/>
  <ellipse cx="960" cy="1080" rx="1100" ry="220" fill="url(#floorPool)"/>
</svg>
